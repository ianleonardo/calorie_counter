<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥗 AI Calorie Counter — Sign In</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.85);
        }

        .google-btn {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-green-50 via-teal-50 to-emerald-100 flex items-center justify-center p-4">

    <div class="login-card rounded-2xl shadow-2xl p-10 max-w-md w-full text-center">
        <!-- Logo / Icon -->
        <div class="float-anim text-6xl mb-6">🥗</div>

        <h1 class="text-3xl font-bold text-gray-800 mb-2">AI Calorie Counter</h1>
        <p class="text-gray-500 mb-8">Snap a photo of your meal to instantly estimate calories, get a macro breakdown,
            and receive personalised nutrition recommendations — all powered by AI.</p>

        <!-- Divider -->
        <div class="mb-8">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-400 rounded-full">Sign in to continue</span>
                </div>
            </div>
        </div>

        <!-- Google Sign-In Button -->
        <a href="{{ url_for('auth.google_login') }}"
            class="google-btn inline-flex items-center justify-center w-full px-6 py-3.5 bg-white border border-gray-300 rounded-xl text-gray-700 font-medium shadow-sm hover:bg-gray-50">
            <svg class="w-5 h-5 mr-3" viewBox="0 0 24 24">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Sign in with Google
        </a>

        <!-- Footer -->
        <p class="mt-8 text-xs text-gray-400">
            By signing in you agree to our
            <a href="{{ url_for('auth.terms') }}" class="underline hover:text-teal-600 transition-colors">Terms of
                Service</a>
            and
            <a href="{{ url_for('auth.privacy') }}" class="underline hover:text-teal-600 transition-colors">Privacy
                Policy</a>.
        </p>
    </div>

</body>

</html>
